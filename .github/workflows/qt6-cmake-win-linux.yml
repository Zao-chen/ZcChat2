name: Qt6 CMake (Windows + Linux + macOS)

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      qt_version:
        description: "Qt version"
        required: false
        default: "6.6.3"
      build_type:
        description: "CMake build type"
        required: false
        default: "Release"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
          - os: ubuntu-latest
            qt_arch: gcc_64
          - os: macos-latest
            qt_arch: clang_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      #Linux需要先装一些依赖(尤其是Qt Widgets/GUI)
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libx11-dev libxext-dev

      - name: Install Ninja (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ninja

      #Windows装Ninja+MSVC环境
      - name: Setup Ninja (Windows)
        if: matrix.os == 'windows-latest'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ inputs.qt_version || '6.6.3' }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: 'qtmultimedia'
          cache: true

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type || 'Release' }}
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Check ONNX Runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if(!(Test-Path "build\onnxruntime.dll")){ throw "build\onnxruntime.dll missing" }

      - name: Check ONNX Runtime (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          test -n "$(find build -maxdepth 1 -type f -name 'libonnxruntime.so.*' -print -quit)"
          test -n "$(find build -maxdepth 1 -type l -name 'libonnxruntime.so.*' -print -quit)"

      - name: Check ONNX Runtime (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          test -n "$(find build/ZcChat2.app/Contents/Frameworks -maxdepth 1 -type f -name 'libonnxruntime.*.dylib' -print -quit)"
          test -f build/ZcChat2.app/Contents/Info.plist
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' build/ZcChat2.app/Contents/Info.plist)" = "com.zaochen.zcchat2"
          /usr/libexec/PlistBuddy -c 'Print :NSMicrophoneUsageDescription' build/ZcChat2.app/Contents/Info.plist
          codesign --verify --deep --strict build/ZcChat2.app
